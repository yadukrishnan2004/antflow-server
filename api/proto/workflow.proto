syntax = "proto3";

package workflow;

option go_package = "github.com/yadukrishnan2004/antflow-server/api/grpc/pb";

import "google/protobuf/timestamp.proto";

service WorkflowService {
  rpc RegisterWorkflow (RegisterWorkflowRequest) returns (RegisterWorkflowResponse);
  rpc StartWorkflow (StartWorkflowRequest) returns (StartWorkflowResponse);
  rpc StreamTasks (StreamTasksRequest) returns (stream StreamTaskResponse);
  rpc CompleteTask (CompleteTaskRequest) returns (CompleteTaskResponse);
  rpc StreamCompensationTasks (StreamTasksRequest) returns (stream CompensationTaskResponse);
  rpc CompleteCompensationTask (CompleteCompensationTaskRequest) returns (CompleteCompensationTaskResponse);
  rpc GetWorkflowResult (GetWorkflowResultRequest) returns (GetWorkflowResultResponse);
  rpc CancelWorkflow (CancelWorkflowRequest) returns (CancelWorkflowResponse);
  rpc StreamWorkflowHistory (StreamWorkflowHistoryRequest) returns (stream HistoryEvent);

  // Signal RPCs — pause/resume support.
  // SendSignal delivers a named payload to a running execution. It returns
  // immediately; if no step is currently waiting for this signal the payload
  // is buffered and delivered when WaitForSignal is next called.
  rpc SendSignal (SendSignalRequest) returns (SendSignalResponse);

  // PollSignal is called by a worker step that wants to pause until a named
  // signal arrives or a timeout elapses. It is a server-streaming RPC that
  // sends exactly one message (the signal payload) and then closes, or closes
  // with an error on timeout / cancellation.
  rpc PollSignal (PollSignalRequest) returns (stream SignalEvent);
}

message RegisterWorkflowRequest {
  string name = 1;
  string workflow_type = 2;
  repeated string steps = 3;
  repeated string compensation_steps = 4;
}

message RegisterWorkflowResponse {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

message StartWorkflowRequest {
  string workflow_id = 1;
  bytes input = 2;
  string task_queue = 3;
}

message StartWorkflowResponse {
  string id = 1;
  string workflow_id = 2;
  string name = 3;
  string state = 4;
}

message StreamTasksRequest {
  string worker_id = 1;
  string task_queue = 2;
}

message HistoryEvent {
  int64 event_id = 1;
  string event_type = 2; // e.g., "WorkflowExecutionStarted", "ActivityTaskCompleted"
  string activity_name = 3; // relevant if it's an activity event
  bytes result = 4; // output from the activity or input to workflow
}

message StreamTaskResponse {
  string task_id = 1;
  string workflow_id = 2;
  string name = 3;
  bytes input = 4;
  string step_name = 5;
  int32 step_index = 6;
}

message CompleteTaskRequest {
  string task_id = 1;
  string worker_id = 2;
  bytes result = 3;
  string error = 4;
}

message CompleteTaskResponse {
  bool success = 1;
}

message CompensationTaskResponse {
  string task_id = 1;
  string workflow_id = 2;
  string name = 3;
  bytes input = 4;
  string step_name = 5;
  string compensation_step_name = 6;
  int32 step_index = 7;
}

message CompleteCompensationTaskRequest {
  string task_id = 1;
  string worker_id = 2;
  bytes result = 3;
  string error = 4;
}

message CompleteCompensationTaskResponse {
  bool success = 1;
}

message GetWorkflowResultRequest {
  string workflow_id = 1;
}

message GetWorkflowResultResponse {
  string state = 1;
  bytes result = 2;
  string error = 3;
}

message CancelWorkflowRequest {
  string workflow_id = 1; // Maps to workflow execution ID
}

message CancelWorkflowResponse {
  bool success = 1;
}

message StreamWorkflowHistoryRequest {
  string workflow_id = 1; // Maps to workflow execution ID
}

// ── Signal messages ───────────────────────────────────────────────────────────

message SendSignalRequest {
  // execution_id is the WorkflowExecution.ID returned by StartWorkflow.
  string execution_id = 1;
  // name identifies which signal this is (e.g. "payment-confirmed").
  string name = 2;
  // payload is an arbitrary byte blob — the step function receives it as-is.
  bytes payload = 3;
}

message SendSignalResponse {
  bool delivered = 1; // true if a waiter was already blocking; false if buffered
}

message PollSignalRequest {
  string execution_id = 1;
  string name = 2;
  // timeout_ms is how long the server should wait before closing the stream
  // with a DEADLINE_EXCEEDED status. 0 means wait indefinitely.
  int64 timeout_ms = 3;
}

message SignalEvent {
  string name = 1;
  bytes payload = 2;
  // timed_out is true when the stream closes because timeout_ms elapsed with
  // no signal arriving. The SDK turns this into an ErrSignalTimeout.
  bool timed_out = 3;
}
